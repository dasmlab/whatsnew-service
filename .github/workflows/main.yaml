name: WhatsNew Service CX Pipeline (Buildah + Podman)

on:
  push:
    branches: ["main", "development"]
  workflow_dispatch:
    inputs:
      cluster_type:
        description: 'Cluster type (ocp or k3s)'
        required: false
        default: 'ocp'
        type: choice
        options:
          - ocp
          - k3s
jobs:
  cx-pipeline:
    runs-on: [self-hosted]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Build Metadata
        id: vars
        run: |
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "VERSION_TAG=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "CONTAINER_NAME=whatsnew-instance-${GITHUB_SHA::8}" >> $GITHUB_ENV
          echo "API_PORT=10020" >> $GITHUB_ENV
          echo "METRICS_PORT=9200" >> $GITHUB_ENV
          echo "IMAGE_URI=ghcr.io/dasmlab/whatsnew-service:${VERSION_TAG}" >> $GITHUB_ENV

      - name: Verify Buildah and Podman
        run: |
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH}"
          buildah --version
          podman --version

      - name: Build Phase
        env:
          GHCR_TOKEN: ${{ secrets.DASMLAB_GHCR_PAT }}
        run: |
          export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:${PATH}"
          if [ -z "${GHCR_TOKEN}" ]; then
            echo "ERROR: GHCR token not set"
            exit 1
          fi

          echo "${GHCR_TOKEN}" | buildah login --username dasmlab --password-stdin ghcr.io
          buildah bud \
            --build-arg ARCH=amd64 \
            --build-arg goproxy=https://proxy.golang.org \
            -t "${IMAGE_URI}" \
            -f Dockerfile \
            .

      - name: Run Phase (Container Health Check)
        env:
          APP_ID: ${{ vars.APP_ID }}
          INSTALLATION_ID: ${{ vars.INSTALLATION_ID }}
          PEM_CONTENTS: ${{ secrets.PEM_CONTENTS }}
        run: |
          podman rm -f "${CONTAINER_NAME}" 2>/dev/null || true
          podman run -d \
            --name "${CONTAINER_NAME}" \
            -p "${API_PORT}:${API_PORT}" \
            -p "${METRICS_PORT}:${METRICS_PORT}" \
            -e APP_ID="${APP_ID}" \
            -e INSTALLATION_ID="${INSTALLATION_ID}" \
            -e PEM_CONTENTS="${PEM_CONTENTS}" \
            "${IMAGE_URI}"

          sleep 5
          podman logs "${CONTAINER_NAME}"
          curl -f "http://localhost:${API_PORT}/get" || (echo "API health check failed" && exit 1)
          curl -f "http://localhost:${METRICS_PORT}/metrics" || (echo "Metrics health check failed" && exit 1)

      - name: Secure Phase (Stub)
        run: |
          echo "Run SAST/DAST tools here (stub)"
          exit 0

      - name: Test Phase (Stub)
        run: |
          echo "Run integration tests here (stub)"
          exit 0

      - name: Publish Phase
        run: |
          buildah push "${IMAGE_URI}"
          echo "Pushed ${IMAGE_URI}"

      - name: GitOps Sync (Deploy) Phase
        env:
          CLUSTER_TYPE: ${{ inputs.cluster_type || 'ocp' }}
        run: |
          PEM_CONTENTS="$(echo "${{ secrets.PEM_CONTENTS }}" | sed 's/^/        /')"

          if [ "$CLUSTER_TYPE" = "ocp" ]; then
            MANIFEST_SOURCE="k8s_envelope/whatsnew-service_deploy-ocp.yaml"
            CLUSTER_NAME="ocp-ai-sno-2"
          else
            MANIFEST_SOURCE="k8s_envelope/whatsnew-service_deploy.yaml"
            CLUSTER_NAME="dasmlab-prod-1"
          fi

          sed \
            -e "s|__VERSION__|${VERSION_TAG}|g" \
            -e "s|__APP_ID__|${{ vars.APP_ID }}|g" \
            -e "s|__INSTALLATION_ID__|${{ vars.INSTALLATION_ID }}|g" \
            -e "/__PEM_CONTENTS__/ { r /dev/stdin" -e "d }" \
            "$MANIFEST_SOURCE" <<<"$PEM_CONTENTS" \
            > generated.yaml

          git config --global user.name "dasmlab-bot"
          git config --global user.email "ci@dasmlab.org"
          git clone https://x-access-token:${{ secrets.DASMLAB_GHCR_PAT }}@github.com/lmcdasm/dasmlab-live-cicd.git

          DEPLOY_DIR="dasmlab-live-cicd/clusters/${CLUSTER_NAME}/whatsnew-service/live"
          ARCHIVE_DIR="dasmlab-live-cicd/clusters/${CLUSTER_NAME}/whatsnew-service/archived"
          mkdir -p "$ARCHIVE_DIR"
          mkdir -p "$DEPLOY_DIR"

          find "$DEPLOY_DIR" -maxdepth 1 -type f -name 'whatsnew-service-v*.yaml' -exec mv {} "$ARCHIVE_DIR"/ \;
          cp generated.yaml "$DEPLOY_DIR/whatsnew-service-${VERSION_TAG}.yaml"

          cd dasmlab-live-cicd
          git add .
          git commit -m "Auto-publish whatsnew-service ${VERSION_TAG} (${CLUSTER_TYPE})"
          git push

      - name: Teardown
        if: always()
        run: |
          podman rm -f "${CONTAINER_NAME}" 2>/dev/null || true
          buildah rm -a 2>/dev/null || true
          rm -rf ~/.docker ~/.local/share/containers 2>/dev/null || true

